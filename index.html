<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body onload="renderImages()">
    <header>
      <div class="container">
        <img src="./img/Logo.png" alt="Logo" />
      </div>
    </header>
    <main class="container main-content">
      <h1>Your personal photo album</h1>
      <div id="img-content" class="image-wrapper"></div>

      <dialog id="image-dialog">
        <div class="dialog-main">
          <div class="dialog-header">
            <h2>iamge name</h2>
            <img src="./img/icons/Property 1=Hover.png" alt="close dialog" />
          </div>
          <img class="dialog-img" src="./img/Imgs/pexels-a-darmel-7862505.jpg" alt="image" />
          <div class="dialog-footer">
            <img src="./img/icons/Property 1=Default_1.png" alt="">
            <span>zähler</span>
            <img src="./img/icons/Property 1=Default_1.png" alt="">
          </div>
        </div>
      </dialog>
    </main>
    <footer>
      <img src="./img/DA_Logo.png" alt="DA Logo" />
      <span>© 2023 Developer Akademie GmbH</span>
    </footer>

    <script src="insert-images.js"></script>
  </body>
</html>
